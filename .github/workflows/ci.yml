name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_ENV: test
  CI: true
  CTEST_OUTPUT_ON_FAILURE: 1
  PYTHONUNBUFFERED: 1

jobs:
  starter-lint:
    name: Starter lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run lint
        run: npm run lint

  starter-unit:
    name: Starter unit tests (node ${{ matrix.node-version }})
    needs: starter-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run unit tests with coverage
        run: npm test -- --coverage

      - name: Enforce starter line coverage (>=80%)
        shell: bash
        run: |
          set -euo pipefail
          test -f coverage/coverage-summary.json
          node - <<'EOF'
          const summary = require('./coverage/coverage-summary.json');
          const pct = Number(summary?.total?.lines?.pct);
          if (!Number.isFinite(pct) || pct < 80) {
            throw new Error(`Starter line coverage must be >=80%; got ${pct}`);
          }
          console.log(`Starter line coverage: ${pct}%`);
          EOF

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-node-${{ matrix.node-version }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  starter-e2e:
    name: Starter E2E Playwright (node ${{ matrix.node-version }})
    needs: starter-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Detect Playwright dependency
        id: playwright-dep
        shell: bash
        run: |
          set -euo pipefail
          if grep -Eq '"(@playwright/test|playwright)"[[:space:]]*:' package.json; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: ${{ steps.playwright-dep.outputs.available == 'true' }}
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        if: ${{ steps.playwright-dep.outputs.available == 'true' }}
        run: npx playwright test

      - name: Verify Playwright evidence contract
        if: ${{ steps.playwright-dep.outputs.available == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f playwright-report/index.html
          test -f test-results/results.json
          test -f test-results/results.xml
          node - <<'EOF'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
          const attachments = [];
          const visit = (value) => {
            if (Array.isArray(value)) {
              value.forEach(visit);
              return;
            }
            if (!value || typeof value !== 'object') {
              return;
            }
            if (Array.isArray(value.attachments)) {
              attachments.push(...value.attachments);
            }
            Object.values(value).forEach(visit);
          };

          visit(report);

          const hasStdout = attachments.some((attachment) =>
            typeof attachment?.name === 'string' &&
            attachment.name.startsWith('stdout-') &&
            typeof attachment.body === 'string'
          );
          const hasStderr = attachments.some((attachment) =>
            typeof attachment?.name === 'string' &&
            attachment.name.startsWith('stderr-') &&
            typeof attachment.body === 'string'
          );
          const hasTrace = attachments.some((attachment) =>
            attachment?.name === 'trace' &&
            typeof attachment.path === 'string' &&
            /(^|[\\/])trace\.zip$/.test(attachment.path)
          );

          if (!hasStdout || !hasStderr || !hasTrace) {
            throw new Error(`Playwright evidence incomplete: stdout=${hasStdout} stderr=${hasStderr} trace=${hasTrace}`);
          }
          EOF

      - name: Skip notice when Playwright dependency is absent
        if: ${{ steps.playwright-dep.outputs.available != 'true' }}
        run: echo "Skipping Playwright execution because the repository does not yet declare a Playwright dependency."

      - name: Upload Playwright HTML report
        if: ${{ always() && steps.playwright-dep.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Playwright test results (traces, screenshots, videos)
        if: ${{ always() && steps.playwright-dep.outputs.available == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 14

  runtime-quick:
    name: Runtime quick (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    # Keep the quick build on PR/push; the longer benchmark/DoD jobs remain
    # explicit gates elsewhere in dod.yml. Scheduled runs use the fuzz job.
    if: ${{ github.event_name != 'schedule' }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-x64-gcc
            runs_on: ubuntu-latest
            cc: gcc
            cxx: g++
          - label: ubuntu-x64-clang
            runs_on: ubuntu-latest
            cc: clang
            cxx: clang++
          - label: ubuntu-arm64-gcc
            runs_on: ubuntu-24.04-arm
            cc: gcc
            cxx: g++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain + cache
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build make ccache python3-pip
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi
          python3 -m pip install --upgrade pip
          echo "max_size = 750M" > ~/.ccache/ccache.conf

      - name: Configure runtime build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-artifacts/runtime-quick
          CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} \
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUS4_BUILD_TESTS=ON \
            -DUS4_BUILD_BENCHMARKS=OFF \
            | tee ci-artifacts/runtime-quick/cmake-configure.log

      - name: Build runtime targets
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build --parallel \
            2>&1 | tee ci-artifacts/runtime-quick/cmake-build.log
          if grep -E '(^|[^[:alpha:]])warning:' ci-artifacts/runtime-quick/cmake-build.log; then
            echo "::error::Build produziu warnings; o gate da issue #125 exige warning budget limpo."
            exit 1
          fi

      - name: Verify runtime + engine test inventory
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build -N \
            | tee ci-artifacts/runtime-quick/ctest-inventory.log
          grep -q 'us4_runtime_smoke_test' ci-artifacts/runtime-quick/ctest-inventory.log
          grep -q 'AdapterGenerationContractTest' ci-artifacts/runtime-quick/ctest-inventory.log
          grep -q 'engine_colibri_forward_oracles' ci-artifacts/runtime-quick/ctest-inventory.log
          grep -q 'engine_colibri_tokenizer_contract' ci-artifacts/runtime-quick/ctest-inventory.log

      - name: Run runtime + engine suite
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure \
            | tee ci-artifacts/runtime-quick/ctest.log

      - name: Upload quick validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-quick-${{ matrix.label }}
          path: |
            ci-artifacts/runtime-quick/
            build/Testing/
          if-no-files-found: warn
          retention-days: 14

  runtime-fuzzing:
    name: Runtime fuzzing (${{ matrix.harness }})
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - harness: us4_fuzz_json_value
            corpus: tests/fixtures/engine/tokenizer
          - harness: us4_fuzz_safetensors_reader
            corpus: tests/fixtures/safetensors
          - harness: us4_fuzz_gguf_reader
            corpus: tests/fixtures/gguf
          - harness: us4_fuzz_bpe_tokenizer
            corpus: tests/fixtures/tokenizer
          - harness: us4_fuzz_dequant_int8
            corpus: runtime/fuzz/corpus/dequant_int8
          - harness: us4_fuzz_dequant_int4
            corpus: runtime/fuzz/corpus/dequant_int4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fuzz toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build clang llvm make

      - name: Generate real-weight quantization corpus
        run: python3 scripts/seed_quant_fuzz_corpus.py

      - name: Configure fuzz build
        shell: bash
        run: |
          set -euo pipefail
          cmake -S . -B build-fuzz -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DUS4_BUILD_TESTS=OFF \
            -DUS4_BUILD_BENCHMARKS=OFF \
            -DUS4_BUILD_FUZZERS=ON \
            -DUS4_ENABLE_ASAN=ON \
            -DUS4_ENABLE_UBSAN=ON

      - name: Build harness
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-fuzz --target ${{ matrix.harness }} --parallel

      - name: Run scheduled fuzz slice
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p fuzz-artifacts/${{ matrix.harness }}
          ./build-fuzz/runtime/fuzz/${{ matrix.harness }} \
            -artifact_prefix=./fuzz-artifacts/${{ matrix.harness }}/ \
            -max_total_time=900 \
            ${{ matrix.corpus }} | tee fuzz-artifacts/${{ matrix.harness }}/run.log

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-${{ matrix.harness }}
          path: fuzz-artifacts/${{ matrix.harness }}/
          if-no-files-found: warn
          retention-days: 14
