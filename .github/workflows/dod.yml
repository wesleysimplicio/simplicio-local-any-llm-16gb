name: DoD Gate

on:
  workflow_dispatch:
# Para acoplar este gate a PR automaticamente, descomente abaixo.
#  pull_request:
#    types: [opened, synchronize, reopened, edited]
#    branches: [main, develop]

concurrency:
  group: dod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CI: true

jobs:
  pr-policy:
    name: PR policy
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title (conventional commit)
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$PR_TITLE" | npx --yes commitlint --extends @commitlint/config-conventional || {
            echo "::error::Titulo do PR nao segue Conventional Commits (ex: feat: ..., fix: ..., chore: ...)."
            exit 1
          }

      - name: Check task reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR body vazio. Inclua referencia a task (ex: 'Closes #42' ou link para .specs/sprints/.../task.md)."
            exit 1
          fi
          if ! echo "$PR_BODY" | grep -Eq '(#[0-9]+|task-?[0-9]+\.md|\.specs/sprints/.+\.task\.md)'; then
            echo "::error::PR body deve referenciar uma task (#NNN, task-NNN.md ou link em .specs/sprints/)."
            exit 1
          fi

      - name: Require ADR link when architecture changes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          if echo "$changed" | grep -Eq '^\.specs/architecture/|^architecture/'; then
            echo "Mudancas detectadas em architecture/. Verificando ADR linkado..."
            if ! echo "${PR_BODY:-}" | grep -Eq '(ADR-[0-9]+|adr-[0-9]+)'; then
              echo "::error::Mudancas em architecture/ exigem ADR linkado no PR body (ex: ADR-001, ADR-042)."
              exit 1
            fi
          fi

  starter-dod:
    name: Starter DoD
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json', 'bin/cli.js', 'test/**/*.js') != '' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-package-lock
          fi

      - name: Run starter unit tests with coverage
        run: npm test -- --coverage

      - name: Check starter coverage threshold (>=80%)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "::error::coverage/coverage-summary.json nao encontrado. Configure o reporter json-summary no test runner."
            exit 1
          fi
          pct="$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.lines.pct)")"
          echo "Coverage de linhas: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p + 0 < 80) { print "::error::Coverage abaixo de 80% (atual: " p "%)"; exit 1 } }'

  runtime-native-dod:
    name: Runtime DoD (${{ matrix.label }})
    runs-on: ${{ matrix.runs_on }}
    if: ${{ hashFiles('CMakeLists.txt', 'runtime/CMakeLists.txt', 'apps/CMakeLists.txt', 'tests/CMakeLists.txt') != '' }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-x64-gcc
            runs_on: ubuntu-latest
            cc: gcc
            cxx: g++
          - label: ubuntu-arm64-gcc
            runs_on: ubuntu-24.04-arm
            cc: gcc
            cxx: g++
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build make ccache python3-pip
          python3 -m pip install --upgrade pip
          echo "max_size = 750M" > ~/.ccache/ccache.conf

      - name: Configure native build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dod-artifacts/runtime-native
          CC=${{ matrix.cc }} CXX=${{ matrix.cxx }} \
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUS4_BUILD_TESTS=ON -DUS4_BUILD_BENCHMARKS=ON \
            | tee dod-artifacts/runtime-native/cmake-configure.log

      - name: Build native runtime
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build --parallel \
            2>&1 | tee dod-artifacts/runtime-native/cmake-build.log
          if grep -E '(^|[^[:alpha:]])warning:' dod-artifacts/runtime-native/cmake-build.log; then
            echo "::error::Build produziu warnings; o gate de DoD para #125 exige warning budget limpo."
            exit 1
          fi

      - name: Verify runtime regression inventory
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build -N \
            | tee dod-artifacts/runtime-native/ctest-inventory.log
          grep -q 'us4_runtime_smoke_test' dod-artifacts/runtime-native/ctest-inventory.log
          grep -q 'us4_runtime_contract_runner' dod-artifacts/runtime-native/ctest-inventory.log
          grep -q 'AdapterGenerationContractTest' dod-artifacts/runtime-native/ctest-inventory.log
          grep -q 'engine_colibri_forward_oracles' dod-artifacts/runtime-native/ctest-inventory.log
          grep -q 'engine_colibri_tokenizer_contract' dod-artifacts/runtime-native/ctest-inventory.log

      - name: Run runtime regression suite
        shell: bash
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure \
            | tee dod-artifacts/runtime-native/ctest.log

      - name: Run runtime coverage gate (>=80% lines)
        if: ${{ matrix.label == 'ubuntu-x64-gcc' }}
        shell: bash
        run: |
          set -euo pipefail
          CC=clang CXX=clang++ ./scripts/coverage.sh 80 build-coverage \
            | tee dod-artifacts/runtime-native/coverage.log
          cp -f build-coverage/coverage-report/summary.txt \
            dod-artifacts/runtime-native/coverage-summary.txt || true
          cp -f build-coverage/coverage-report/coverage.lcov \
            dod-artifacts/runtime-native/coverage.lcov || true

      - name: Run native benchmark gate
        shell: bash
        run: |
          set -euo pipefail
          ./build/runtime/benchmarks/dense_baseline \
            | tee dod-artifacts/runtime-native/dense_baseline.log
          grep -q '^benchmark=dense_baseline$' dod-artifacts/runtime-native/dense_baseline.log
          grep -q '^case=dense-default/auto$' dod-artifacts/runtime-native/dense_baseline.log
          grep -q '^compare_case=lowbit-int8$' dod-artifacts/runtime-native/dense_baseline.log
          grep -q '^compare_case=lowbit-int4$' dod-artifacts/runtime-native/dense_baseline.log

      - name: Run native correctness gate
        shell: bash
        run: |
          set -euo pipefail
          ./build/runtime/benchmarks/correctness/correctness_check \
            | tee dod-artifacts/runtime-native/correctness.log
          grep -q '^benchmark=correctness$' dod-artifacts/runtime-native/correctness.log
          grep -q '^correctness_status=pass$' dod-artifacts/runtime-native/correctness.log

      - name: Run direct native CLI contract checks
        shell: bash
        run: |
          set -euo pipefail
          find_native_cli() {
            local candidates=(
              "./build/apps/us4-cli"
              "./build/us4-cli"
              "./build/apps/Release/us4-cli"
              "./build/Release/us4-cli"
            )
            local candidate
            for candidate in "${candidates[@]}"; do
              if [ -x "$candidate" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          native_cli="$(find_native_cli)"
          echo "native_cli=${native_cli}" | tee dod-artifacts/runtime-native/native-cli-path.txt

          "${native_cli}" --probe --json > dod-artifacts/runtime-native/us4-cli-probe.json
          "${native_cli}" run \
            --model-path tests/fixtures/models/qwen-0.5b/model.us4manifest \
            --backend scalar \
            --prompt hi \
            --max-tokens 4 \
            --json > dod-artifacts/runtime-native/us4-cli-run.json

          python3 - <<'EOF'
          import json
          from pathlib import Path

          probe = json.loads(Path('dod-artifacts/runtime-native/us4-cli-probe.json').read_text())
          if not probe.get('version') or not probe.get('platform') or not probe.get('recommended_mode'):
              raise SystemExit('native probe payload missing expected fields')

          run = json.loads(Path('dod-artifacts/runtime-native/us4-cli-run.json').read_text())
          if run.get('backend') != 'scalar' or run.get('fallback') is not False:
              raise SystemExit('native scalar run contract drifted')
          if not isinstance(run.get('generated_tokens'), list) or len(run['generated_tokens']) < 4:
              raise SystemExit('native scalar run did not emit enough tokens')
          EOF

      - name: Upload runtime DoD artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-native-dod-${{ matrix.label }}
          path: |
            dod-artifacts/runtime-native/
            build/Testing/Temporary/
          if-no-files-found: warn
          retention-days: 14

  runtime-sanitizers:
    name: Runtime sanitizers (ubuntu-x64-clang)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('CMakeLists.txt', 'runtime/CMakeLists.txt', 'tests/CMakeLists.txt') != '' }}
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sanitizer toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ninja-build make clang llvm ccache

      - name: Configure sanitizer build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dod-artifacts/runtime-sanitizers
          CC=clang CXX=clang++ \
          cmake -S . -B build-sanitizers -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DUS4_BUILD_TESTS=ON \
            -DUS4_BUILD_BENCHMARKS=OFF \
            -DUS4_ENABLE_ASAN=ON \
            -DUS4_ENABLE_UBSAN=ON \
            | tee dod-artifacts/runtime-sanitizers/cmake-configure.log

      - name: Build sanitizer targets
        shell: bash
        run: |
          set -euo pipefail
          cmake --build build-sanitizers --parallel \
            | tee dod-artifacts/runtime-sanitizers/cmake-build.log

      - name: Run sanitizer suite
        shell: bash
        run: |
          set -euo pipefail
          ASAN_OPTIONS=detect_leaks=1:halt_on_error=1 \
          UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1 \
          ctest --test-dir build-sanitizers --output-on-failure \
            | tee dod-artifacts/runtime-sanitizers/ctest.log

      - name: Upload sanitizer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sanitizers-ubuntu-x64-clang
          path: dod-artifacts/runtime-sanitizers/
          if-no-files-found: warn
          retention-days: 14
